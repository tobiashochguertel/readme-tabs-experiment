name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "readme/**"
      - "screenshots/**"
      - "scripts/generate_html.py"
      - "scripts/generate_svg.py"
      - "docs/**"
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build GitHub Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Generate interactive SVG
        run: uv run --script scripts/generate_svg.py --tab-group code-examples --output docs/animated-preview.svg

      - name: Generate HTML + interactive-tabs.svg
        run: uv run --script scripts/generate_html.py

      - name: Copy screenshots into docs/
        run: |
          mkdir -p docs/screenshots
          cp -r screenshots/* docs/screenshots/

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
